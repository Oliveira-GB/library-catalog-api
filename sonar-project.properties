# SonarCloud Configuration
# Project identification
sonar.projectKey=Oliveira-GB_library-catalog-api
sonar.organization=oliveira-gb
sonar.host.url=https://sonarcloud.io

# Source code configuration
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage configuration
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions (files that don't need coverage)
sonar.coverage.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/dto/**/*,\
  **/exception/**,\
  **/exception/**/*,\
  **/entity/**,\
  **/entity/**/*,\
  **/LibraryCatalogApiApplication.java

# Test exclusions
sonar.test.exclusions=\
  **/test/**/*

# Quality Gate - Coverage threshold (70% as per requirements)
# Note: This is configured in SonarCloud UI, but documented here
# sonar.qualitygate.wait=false (we don't block PRs)

# Additional settings
sonar.java.source=21
sonar.java.target=21
