spring:
  application:
    name: library-catalog-api

  # Datasource Configuration - Environment variables required (fail fast if not set)
  datasource:
    url: ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

  # MVC Configuration
  mvc:
    problemdetails:
      enabled: true

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

# Server Configuration - Port configurable via environment variable (12-Factor App)
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# Logging Configuration (Structured Logging - Wide Events Pattern)
logging:
  level:
    root: INFO
    github.oliveira.gb.librarycatalogapi: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z', UTC} %5p [%t] [%X{traceId:-},%X{spanId:-}] %c{1} - %m%n%ex"

# Application Security Configuration
app:
  security:
    admin-password: ${ADMIN_PASSWORD}

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      show-components: always