spring:
  config:
    activate:
      on-profile: test

  # Datasource is configured automatically by @ServiceConnection
  # Testcontainers manages PostgreSQL container lifecycle
  sql:
    init:
      mode: never

  # JPA configuration for tests - SQL visibility for TDD
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  # Flyway configuration for tests
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false

# Test logging configuration - Informative for TDD
logging:
  level:
    root: INFO
    github.oliveira.gb.librarycatalogapi: DEBUG
    org.springframework.test: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"